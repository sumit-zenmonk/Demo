name: survey

services:
  database:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file: ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "9000:9000"
    depends_on:
      - database
    command: sh -c "npm run build && npm run migration:run && npm run start:dev"
    env_file: ./backend/.env # npm run seed can be done anytime but not everytime while running services

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - backend
    env_file: ./frontend/.env

volumes:
  postgres_data: {}
